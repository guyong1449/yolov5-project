# AdamW smoke hyperparameters for short-run debugging.
# This avoids copying the SGD-style warmup profile into a 3-epoch smoke run.

lr0: 0.0003  # lower base lr for AdamW smoke stability
lrf: 0.1
momentum: 0.9
weight_decay: 0.0005
warmup_epochs: 0.5  # do not spend the entire 3-epoch smoke inside warmup
warmup_momentum: 0.8
warmup_bias_lr: 0.01  # avoid the SGD-style 0.1 bias warmup spike
box: 0.05
cls: 0.5
cls_pw: 1.0
obj: 1.0
obj_pw: 1.0
iou_t: 0.20
anchor_t: 4.0
fl_gamma: 0.0
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
copy_paste: 0.0
