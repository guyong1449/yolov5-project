# Markdown link checker for docs and repo guides (not full upstream lychee sweep).

name: Check Broken links

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC (less noise than daily)

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: |
            --accept 429,999
            --exclude-loopback
            --exclude 'https?://(www\.)?(linkedin\.com|twitter\.com|instagram\.com|kaggle\.com)'
            --exclude '/abs/path/'
            --exclude-path '**/.specstory/**'
            --exclude-path '**/archive/**'
            --exclude-mail
            --no-progress
            './README.md'
            './AGENTS.md'
            './docs/**/*.md'
