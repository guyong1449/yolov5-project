# Mark inactive issues/PRs stale. Disabled on schedule for forks with few issues; run manually if needed.

name: Close stale issues

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          stale-issue-message: |
            This issue has had no recent activity and may be closed soon. Comment or reopen if it is still relevant.

          stale-pr-message: |
            This pull request has had no recent activity and may be closed soon. Comment or reopen if work should continue.

          days-before-issue-stale: 30
          days-before-issue-close: 10
          days-before-pr-stale: 90
          days-before-pr-close: 30
          exempt-issue-labels: 'documentation,tutorial,TODO'
          operations-per-run: 300
