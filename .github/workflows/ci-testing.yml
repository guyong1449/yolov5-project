# Project CI — pytest on push/PR to main; replaces upstream Ultralytics full train/benchmark matrix.

name: YOLOv5 CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * *'  # daily UTC 00:00

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (ubuntu, py3.10)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt pytest --extra-index-url https://download.pytorch.org/whl/cpu
          python --version
          pip --version

      - name: Run unit tests
        run: |
          # dataAirVis.yaml points at local /root/workspace dataset paths; skip on GitHub-hosted runners.
          pytest tests/ --ignore=tests/test_data_airvis_four_class.py -q
